<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Любимая ❤️</title>
<style>
:root{
  --pink:#ec4899;
  --pink2:#f472b6;
  --bg1:#ffe4ec;
  --bg2:#ffd6e7;
  --text:#334155;
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--text);
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  overflow-x:hidden;
}
.bg-blur{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.blob{
  position:absolute;border-radius:999px;filter:blur(55px);opacity:.35;
  animation:blobMove 13s ease-in-out infinite alternate;
}
.blob.one{width:280px;height:280px;background:#f9a8d4;top:-70px;left:-60px}
.blob.two{width:320px;height:320px;background:#fbcfe8;right:-80px;bottom:-80px;animation-duration:16s}
.blob.three{width:220px;height:220px;background:#fecdd3;left:40%;top:30%;animation-duration:18s}
.hearts{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:1}
.heart{position:absolute;bottom:-40px;animation:floatUp linear infinite;opacity:.75}
.container{
  position:relative;z-index:2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
}
.card{
  width:100%;max-width:560px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.65);border-radius:28px;padding:24px;text-align:center;
  box-shadow:0 18px 45px rgba(236,72,153,.18);animation:cardIn .45s ease;
}
.badge{
  display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:999px;margin-bottom:14px;
  font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  background:rgba(244,114,182,.12);color:var(--pink)
}
h1{margin:0 0 14px;font-size:30px;line-height:1.2;color:#1f2937}
.subtitle{margin:0 0 18px;color:#64748b;font-size:14px;line-height:1.5}
img{
  width:100%;height:360px;object-fit:cover;border-radius:22px;margin:12px 0 18px;
  box-shadow:0 14px 28px rgba(0,0,0,.12);animation:photoIn .45s ease
}
.buttons{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
button{
  padding:13px 22px;border:none;border-radius:18px;cursor:pointer;font-size:16px;font-weight:700;
  transition:transform .18s ease, box-shadow .22s ease, opacity .18s ease, background .22s ease
}
button:hover{transform:translateY(-2px) scale(1.02)}
button:active{transform:scale(.97)}
.yes{
  background:linear-gradient(180deg,var(--pink2),var(--pink));color:#fff;
  box-shadow:0 12px 25px rgba(236,72,153,.28)
}
.no,.option{
  background:#fff;color:#475569;border:1px solid #fbcfe8;
}
.full{width:100%}
.final-scene{
  position:relative;
  overflow:hidden;
  border-radius:26px;
  padding:24px 18px 22px;
  background:
    radial-gradient(circle at top, rgba(255,255,255,.9), rgba(255,255,255,.72)),
    linear-gradient(180deg,#fff1f7,#fff);
  box-shadow:
    inset 0 0 0 1px rgba(244,114,182,.14),
    0 18px 40px rgba(236,72,153,.12);
  animation:fadeUp .65s ease;
}
.final-glow{
  position:absolute;
  inset:-20%;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,.85), transparent 25%),
    radial-gradient(circle at 50% 85%, rgba(244,114,182,.18), transparent 32%);
  pointer-events:none;
  animation:softGlow 4s ease-in-out infinite;
}
.sparkle{
  position:absolute;
  width:18px;height:18px;
  background:radial-gradient(circle, rgba(255,255,255,1) 0 25%, rgba(255,255,255,0) 70%);
  border-radius:999px;
  filter:drop-shadow(0 0 10px rgba(255,255,255,.95));
  animation:twinkle 2.6s ease-in-out infinite;
}
.sparkle:before,.sparkle:after{
  content:"";
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,.95);
  border-radius:999px;
}
.sparkle:before{width:2px;height:22px}
.sparkle:after{width:22px;height:2px}
.sparkle.s1{top:10%;left:10%;animation-delay:.1s}
.sparkle.s2{top:20%;right:12%;animation-delay:.8s}
.sparkle.s3{bottom:18%;left:14%;animation-delay:1.4s}
.sparkle.s4{bottom:12%;right:10%;animation-delay:2s}
.final-title{
  margin:0 0 10px;
  font-size:32px;
  color:#1f2937;
  animation:riseIn .7s ease both;
}
.final-subtitle{
  margin:0 0 18px;
  color:#64748b;
  font-size:15px;
  animation:riseIn .7s ease .15s both;
}
.final-text{
  position:relative;
  text-align:left;
  border-radius:22px;
  padding:18px;
  font-size:18px;
  line-height:1.78;
  color:#334155;
  background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(255,244,248,.96));
  box-shadow:inset 0 0 0 1px rgba(244,114,182,.12);
  animation:riseIn .8s ease .25s both;
}
.final-text:after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,.45) 40%, transparent 75%);
  transform:translateX(-120%);
  animation:shineSweep 3.4s ease-in-out infinite 1.2s;
}
.final-hearts{
  margin-top:18px;font-size:30px;display:flex;justify-content:center;gap:12px;
  animation:pulse 1.8s ease-in-out infinite;
}
.final-counter{
  margin-top:14px;
  color:#64748b;
  font-size:17px;
  animation:riseIn .8s ease .45s both;
}
.quiz-card,.player-box,.timeline-card{
  text-align:left;background:linear-gradient(180deg,#fff1f7,#fff);border-radius:22px;padding:18px;
  box-shadow:inset 0 0 0 1px rgba(244,114,182,.14);animation:fadeUp .45s ease
}
.quiz-progress{margin-bottom:10px;font-size:13px;color:#64748b;text-align:center}
.quiz-question{margin:6px 0 16px;font-size:24px;line-height:1.35;color:#1f2937;text-align:center}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.option{width:100%;text-align:left;padding:14px 16px}
.option.correct{background:#ecfdf5;border-color:#86efac;color:#166534}
.option.wrong{background:#fff1f2;border-color:#fda4af;color:#be123c}
.score{margin-top:14px;text-align:center;font-size:18px;color:#475569}
.player-title{font-size:22px;font-weight:700;text-align:center;color:#1f2937;margin-bottom:8px}
.player-sub{text-align:center;color:#64748b;font-size:14px;margin-bottom:14px}
audio{width:100%;margin:8px 0 14px}
.music-badge{
  position:fixed;right:16px;bottom:16px;z-index:12;background:rgba(255,255,255,.92);
  border:1px solid rgba(244,114,182,.25);border-radius:999px;padding:10px 14px;font-size:13px;color:#475569;
  box-shadow:0 8px 24px rgba(236,72,153,.15)
}
.timeline-line{
  position:relative;
  margin:10px 0 0 0;
  padding-left:28px;
}
.timeline-line:before{
  content:"";
  position:absolute;
  left:10px; top:4px; bottom:4px;
  width:3px;
  background:linear-gradient(180deg,#f9a8d4,#ec4899);
  border-radius:999px;
}
.timeline-item{
  position:relative;
  margin:0 0 18px 0;
  padding:14px 14px 14px 16px;
  border-radius:18px;
  background:#fff;
  box-shadow:0 10px 22px rgba(236,72,153,.08);
  animation:timelineIn .55s ease both;
}
.timeline-item:nth-child(1){animation-delay:.05s}
.timeline-item:nth-child(2){animation-delay:.18s}
.timeline-item:nth-child(3){animation-delay:.31s}
.timeline-item:nth-child(4){animation-delay:.44s}
.timeline-item:nth-child(5){animation-delay:.57s}
.timeline-item:before{
  content:"";
  position:absolute;
  left:-23px; top:22px;
  width:14px; height:14px;
  border-radius:999px;
  background:linear-gradient(180deg,#f472b6,#ec4899);
  box-shadow:0 0 0 5px rgba(244,114,182,.15);
}
.timeline-date{
  color:#ec4899;
  font-size:13px;
  font-weight:700;
  letter-spacing:.03em;
  margin-bottom:5px;
}
.timeline-text{
  color:#334155;
  font-size:16px;
  line-height:1.45;
}
.timeline-shine{
  position:relative;
  overflow:hidden;
}
.timeline-shine:after{
  content:"";
  position:absolute;
  inset:-150% auto auto -120%;
  width:80%;
  height:250%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.7), transparent);
  transform:rotate(18deg);
  animation:shine 3.2s ease-in-out infinite;
}
.volume-wrap{
  margin-top:10px;
  text-align:left;
}
.volume-label{
  font-size:13px;
  color:#64748b;
  margin-bottom:6px;
}
input[type=range]{width:100%}
.modal{
  position:fixed;inset:0;background:rgba(15,23,42,.38);display:flex;align-items:center;justify-content:center;
  padding:20px;z-index:20;animation:fadeIn .2s ease
}
.modal-box{
  width:100%;max-width:320px;background:#fff;border-radius:24px;padding:22px 18px 18px;text-align:center;
  box-shadow:0 24px 50px rgba(0,0,0,.18);animation:popIn .22s ease
}
.modal-icon{font-size:28px;margin-bottom:10px;animation:pulse 1.6s ease infinite}
.modal-box p{margin:0 0 14px;font-size:21px;line-height:1.45;color:#1f2937}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes photoIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:0}15%{opacity:.8}100%{transform:translateY(-110vh) rotate(18deg);opacity:0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes blobMove{from{transform:translate(0,0) scale(1)}to{transform:translate(35px,-25px) scale(1.08)}}
@keyframes timelineIn{from{opacity:0;transform:translateY(18px) translateX(8px)}to{opacity:1;transform:translateY(0) translateX(0)}}
@keyframes shine{0%{left:-120%}55%,100%{left:150%}}
@keyframes riseIn{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes softGlow{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes twinkle{0%,100%{opacity:.3;transform:scale(.8) rotate(0deg)}50%{opacity:1;transform:scale(1.15) rotate(25deg)}}
@keyframes shineSweep{0%,20%{transform:translateX(-120%)}45%,100%{transform:translateX(140%)}}
@media (max-width: 520px){
  .container{padding:16px}
  .card{padding:20px;border-radius:24px}
  h1{font-size:25px}
  img{height:300px}
  button{width:100%}
  .buttons{flex-direction:column}
  .music-badge{left:16px;right:16px;text-align:center}
  .final-title{font-size:28px}
}
</style>
</head>
<body>
<div class="bg-blur">
  <div class="blob one"></div>
  <div class="blob two"></div>
  <div class="blob three"></div>
</div>
<div class="hearts" id="hearts"></div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <div class="card" id="app"></div>
</div>

<div class="music-badge" id="musicBadge" style="display:none;">🎵 Музыка продолжает играть</div>

<script>
let page = 1;
let modalText = null;
let hideNoOnKiss = false;

let quizIndex = 0;
let quizScore = 0;
let selectedAnswer = null;
let musicStarted = false;

const quizQuestions = [
  {
    question: "Где мы познакомились?",
    correct: "a",
    answers: [
      { key: "a", text: "а) Дайвинчик" },
      { key: "b", text: "б) Вк знакомства" },
      { key: "c", text: "в) В реальной жизни" }
    ]
  },
  {
    question: "Наш первый поцелуй?",
    correct: "c",
    answers: [
      { key: "a", text: "а) 5 марта" },
      { key: "b", text: "б) 13 сентября" },
      { key: "c", text: "в) 1 июня" }
    ]
  },
  {
    question: "Что я больше всего люблю в тебе?",
    correct: "d",
    answers: [
      { key: "a", text: "а) улыбку" },
      { key: "b", text: "б) глазки" },
      { key: "c", text: "в) фигуру" },
      { key: "d", text: "г) все" }
    ]
  }
];

function showModal(text){
  modalText = text;
  render();
}
function closeModal(){
  const m = document.querySelector('.modal');
  if(m) m.remove();
}
function moveButton(btn){
  const x = Math.random()*180 - 90;
  const y = Math.random()*40 - 20;
  btn.style.transform = `translate(${x}px,${y}px)`;
}
function createHearts(){
  const wrap = document.getElementById('hearts');
  wrap.innerHTML = '';
  for(let i=0;i<22;i++){
    const el = document.createElement('div');
    el.className = 'heart';
    el.style.left = Math.random()*100 + 'vw';
    el.style.animationDuration = (4 + Math.random()*4) + 's';
    el.style.animationDelay = (Math.random()*4) + 's';
    el.style.fontSize = (14 + Math.random()*20) + 'px';
    el.innerHTML = '❤️';
    wrap.appendChild(el);
  }
}
function resetQuiz(){
  quizIndex = 0;
  quizScore = 0;
  selectedAnswer = null;
}
function answerQuiz(key){
  if(selectedAnswer !== null) return;
  selectedAnswer = key;
  if(key === quizQuestions[quizIndex].correct){
    quizScore++;
  }
  render();
}
function nextQuiz(){
  if(quizIndex < quizQuestions.length - 1){
    quizIndex++;
    selectedAnswer = null;
    render();
  } else {
    page = 7;
    render();
  }
}
function setVolume(val){
  const audio = document.getElementById('bgMusic');
  audio.volume = Number(val);
}
function startMusicAndContinue(){
  const audio = document.getElementById('bgMusic');
  audio.volume = 0.12;
  audio.play().then(() => {
    musicStarted = true;
    page = 3;
    render();
  }).catch(() => {
    page = 3;
    render();
  });
}
function renderQuiz(){
  const q = quizQuestions[quizIndex];
  const allAnswered = selectedAnswer !== null;
  let optionsHtml = q.answers.map(ans => {
    let cls = "option";
    if(allAnswered){
      if(ans.key === q.correct) cls += " correct";
      else if(ans.key === selectedAnswer) cls += " wrong";
    }
    return `<button class="${cls}" onclick="answerQuiz('${ans.key}')">${ans.text}</button>`;
  }).join("");

  let resultText = "";
  if(allAnswered){
    resultText = selectedAnswer === q.correct
      ? "Правильно! Умничка ❤️"
      : "Не угадала 😏 Но правильный ответ я подсветил";
  }

  return `
    <div class="badge">🎮 Мини-игра</div>
    <h1>Насколько хорошо ты меня помнишь?</h1>
    <p class="subtitle">Ответь на несколько вопросов про нас 💖</p>
    <div class="quiz-card">
      <div class="quiz-progress">Вопрос ${quizIndex + 1} из ${quizQuestions.length}</div>
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-options">${optionsHtml}</div>
      ${allAnswered ? `<div class="score">${resultText}</div>` : ""}
      ${allAnswered ? `<button class="yes full" style="margin-top:14px" onclick="nextQuiz()">${quizIndex < quizQuestions.length - 1 ? "Далее" : "Дальше ❤️"}</button>` : ""}
    </div>
  `;
}

function render(){
  const app = document.getElementById("app");
  const badge = document.getElementById("musicBadge");
  badge.style.display = musicStarted && page >= 3 ? "block" : "none";

  let html = "";

  if(page === 1){
    html = `
      <div class="badge">❤️ Love Story</div>
      <h1>Любимая, это тебе, готова ли продолжить просмотр?</h1>
      <p class="subtitle">Я сделал для тебя маленький романтический сюрприз ✨</p>
      <div class="buttons" style="margin-top:24px">
        <button class="no" onmouseover="moveButton(this)">Нет</button>
        <button class="yes" onclick="showModal('Умница!')">Да</button>
      </div>
    `;
  }

  if(page === 2){
    html = `
      <div class="badge">🎵 Наша песня</div>
      <h1>Включи музыку и листай дальше</h1>
      <p class="subtitle">Люби меня — Miyagi & Andy Panda</p>
      <div class="player-box">
        <div class="player-title">Музыка будет играть дальше на всех страницах</div>
        <div class="player-sub">Я сразу сделал громкость тише, чтобы было приятнее слушать</div>
        <audio controls>
          <source src="music.mp3" type="audio/mpeg">
        </audio>
        <div class="volume-wrap">
          <div class="volume-label">Громкость музыки</div>
          <input type="range" min="0.03" max="0.4" step="0.01" value="0.12" oninput="setVolume(this.value)">
        </div>
        <button class="yes full" style="margin-top:14px" onclick="startMusicAndContinue()">Включить и продолжить ❤️</button>
      </div>
    `;
  }

  if(page === 3){
    html = `
      <div class="badge">☕ Наши моменты</div>
      <h1>Помнишь ли нашу первую посиделку в кафе?</h1>
      <p class="subtitle">С этого момента всё стало особенно тёплым и важным</p>
      <img src="photo1.jpg" alt="Наше фото в кафе"/>
      <div class="buttons">
        <button class="no" onclick="showModal('Ответ неверный 😡')">Нет</button>
        <button class="yes" onclick="showModal('Молодец! Верный ответ ❤️')">Да</button>
      </div>
    `;
  }

  if(page === 4){
    html = `
      <div class="badge">💋 Поцелуй</div>
      <h1>Помнишь ли ты наш первый поцелуй?</h1>
      <p class="subtitle">Вот тут ошибаться уже точно нельзя 💖</p>
      <img src="photo2.jpg" alt="Наш первый поцелуй"/>
      <div class="buttons">
        ${hideNoOnKiss ? "" : `<button class="no" onclick="hideNoOnKiss = true; render();">Нет</button>`}
        <button class="yes" onclick="showModal('Молодчинка! Держи поцелуйчик 💋')">Да</button>
      </div>
    `;
  }

  if(page === 5){
    html = `
      <div class="badge">🕰️ Наш таймлайн</div>
      <h1>Наши самые важные моменты</h1>
      <p class="subtitle">Я помню каждый из них, и каждый для меня очень дорог ✨</p>
      <div class="timeline-card timeline-shine">
        <div class="timeline-line">
          <div class="timeline-item">
            <div class="timeline-date">2 апреля 2025</div>
            <div class="timeline-text">День, когда мы только написали друг другу 💬</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-date">10 апреля 2025</div>
            <div class="timeline-text">Наша первая прогулка 🚶</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-date">13 апреля 2025</div>
            <div class="timeline-text">Наша первая посиделка в кафе ☕</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-date">1 июня 2025</div>
            <div class="timeline-text">Наш первый поцелуй 💋</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-date">31 декабря 2025</div>
            <div class="timeline-text">Предложение руки и сердца 💍</div>
          </div>
        </div>
        <button class="yes full" style="margin-top:14px" onclick="page=6;render()">Дальше ❤️</button>
      </div>
    `;
  }

  if(page === 6){
    html = renderQuiz();
  }

  if(page === 7){
    html = `
      <div class="badge">💍 Самое важное</div>
      <h1>А помнишь ли наше самое важное и главное событие?</h1>
      <p class="subtitle">Один из самых драгоценных моментов в моей жизни</p>
      <img src="photo3.jpg" alt="Наше самое важное событие"/>
      <button class="yes full" onclick="goFinal()">Конечно!</button>
    `;
  }

  if(page === 8){
    html = `
      <div class="badge">❤️ Для тебя</div>
      <div class="final-scene">
        <div class="final-glow"></div>
        <div class="sparkle s1"></div>
        <div class="sparkle s2"></div>
        <div class="sparkle s3"></div>
        <div class="sparkle s4"></div>
        <h1 class="final-title">И я тоже всё помню</h1>
        <p class="final-subtitle">И это я хочу, чтобы ты прочитала до конца</p>
        <div class="final-text">
          И я тоже помню, помню все важные наши события, все наши прогулки, держания за руки и поцелуи,
          каждый момент проведенный с тобой становится для меня самым лучшим, скоро мы будем уже не парой,
          а мужем с женой, которые проживут долгую и счастливую жизнь, я тебя очень сильно люблю! ❤️
        </div>
        <div class="final-hearts"><span>❤️</span><span>💖</span><span>❤️</span></div>
        <div class="final-counter">Ты ответила правильно на ${quizScore} из ${quizQuestions.length} вопросов 💘</div>
      </div>
    `;
  }

  app.innerHTML = html;

  if(modalText){
    const currentText = modalText;
    const modal = document.createElement("div");
    modal.className = "modal";
    modal.innerHTML = `
      <div class="modal-box">
        <div class="modal-icon">✨</div>
        <p>${currentText}</p>
        <button class="yes full">Далее</button>
      </div>
    `;

    modal.querySelector("button").onclick = () => {
      closeModal();

      if(page === 1) page = 2;
      else if(page === 3 && currentText.includes("Молодец")) page = 4;
      else if(page === 3) page = 3;
      else if(page === 4){
        resetQuiz();
        page = 5;
      }

      modalText = null;
      render();
    };

    document.body.appendChild(modal);
  }
}

function goFinal(){
  page = 8;
  render();
}

createHearts();
setVolume(0.12);
render();
</script>
</body>
</html>
